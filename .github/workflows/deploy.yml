# Auto-deploy to xneelo on every push to main.
#
# Two jobs:
#   1. lint   — runs `php -l` against every PHP file. Fails if any
#               file has a syntax error, which keeps broken pushes from
#               reaching production.
#   2. deploy — SSHes into the production server and runs bin/deploy.sh,
#               which does `git fetch + reset --hard`, then re-applies
#               data/schema.sql via bin/migrate-schema.php.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#
#   DEPLOY_SSH_HOST     hostname or IP of the server (e.g. wifiber.co.za
#                       or whatever xneelo gives you for SSH)
#   DEPLOY_SSH_USER     SSH username, e.g. wifibfjedj
#   DEPLOY_SSH_PORT     SSH port (xneelo: usually 22) — optional
#   DEPLOY_SSH_PASSWORD SSH password for the deploy user.
#
# Note on auth: xneelo disables SSH publickey auth on shared accounts,
# so we use password auth here. If publickey ever gets enabled, swap
# `password:` for `key:` and store the *private* key in DEPLOY_SSH_KEY.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  lint:
    name: PHP syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: none
          coverage: none
      - name: php -l on every .php file
        run: |
          set -e
          fail=0
          while IFS= read -r -d '' f; do
            php -l "$f" > /dev/null 2>&1 || { php -l "$f"; fail=1; }
          done < <(find . -type f -name '*.php' -not -path './.git/*' -print0)
          [ "$fail" = "0" ]

  deploy:
    name: Deploy to production
    needs: lint
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Sanity-check secrets are present
        run: |
          [ -n "${{ secrets.DEPLOY_SSH_HOST     }}" ] || { echo "DEPLOY_SSH_HOST secret is missing";     exit 1; }
          [ -n "${{ secrets.DEPLOY_SSH_USER     }}" ] || { echo "DEPLOY_SSH_USER secret is missing";     exit 1; }
          [ -n "${{ secrets.DEPLOY_SSH_PASSWORD }}" ] || { echo "DEPLOY_SSH_PASSWORD secret is missing"; exit 1; }

      - name: Run bin/deploy.sh on the server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          port:     ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          # 2-min cap; deploy.sh + schema migration should be a few seconds.
          command_timeout: 2m
          # Allocate a PTY so the script's stdout/stderr streams back live
          # instead of being buffered and dropped on early failure — older
          # runs failed with no output at all, hiding the real error.
          request_pty: true
          script: |
            set -e
            cd ~/public_html
            bash bin/deploy.sh 2>&1
